<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AURELIUS VANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.75)
),
url('https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=2000');

background-size:cover;
background-position:center;

font-family:Inter,sans-serif;
}

.container{
width:420px;
background:rgba(15,15,15,.95);

border:1px solid rgba(212,175,55,.2);

padding:50px 40px;

backdrop-filter:blur(10px);
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
font-family:Cinzel,serif;
color:#D4AF37;
font-size:28px;
letter-spacing:5px;
}

.tabs{
display:flex;
margin-bottom:30px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
background:none;
color:#888;
font-size:12px;
letter-spacing:3px;
}

.tabs button.active{
color:#D4AF37;
border-bottom:2px solid #D4AF37;
}

.form{
display:none;
}

.form.active{
display:block;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;

background:#111;
border:1px solid #333;

color:white;
font-size:14px;
}

input:focus{
outline:none;
border-color:#D4AF37;
}

.submit-btn{
width:100%;
padding:15px;

background:#D4AF37;
color:black;

border:none;
cursor:pointer;

font-weight:600;
letter-spacing:2px;
}

.submit-btn:hover{
opacity:.9;
}

.back-btn{
display:block;
text-align:center;
margin-top:20px;
color:#999;
text-decoration:none;
font-size:13px;
}

#message{
    margin-top:20px;
    text-align:center;
    font-size:14px;
    min-height:20px;
    color:#D4AF37;
}

.error{
    color:#ff6b6b;
}

.success{
    color:#D4AF37;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:50px;
    margin-bottom:35px;
}

.tab{
    background:none;
    border:none;
    color:#888;
    font-size:14px;
    letter-spacing:4px;
    cursor:pointer;
    padding-bottom:10px;
}

.tab.active{
    color:#D4AF37;
    border-bottom:2px solid #D4AF37;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

.switch-text{
    margin-top:20px;
    text-align:center;
    color:#b0b0b0;       /* Light grey */
    font-size:14px;
}

.switch-text a{
    color:#D4AF37;       /* Luxury Gold */
    text-decoration:none;
    font-weight:500;
    cursor:pointer;
    transition:all 0.3s ease;
}

.switch-text a:hover{
    color:#f1c75b;       /* Slightly brighter gold on hover */
    text-decoration:underline;
}

.switch-text span{
    color:#D4AF37;
    cursor:pointer;
}

.switch-text span:hover{
    text-decoration:underline;
}

.back-btn:hover{
color:#D4AF37;
}

</style>
</head>

<body>

<div class="container">
    

<div class="logo">
<h1>AURELIUS VANCE</h1>
</div>

<div class="tabs">
    <button type="button" id="signinTab" class="tab active">
        SIGN IN
    </button>

    <button type="button" id="registerTab" class="tab">
        REGISTER
    </button>
</div>

<!-- Sign In Form -->
<form id="signinForm" class="form active">

    <input type="email"
           id="loginEmail"
           placeholder="Email Address"
           required>

    <input type="password"
           id="loginPassword"
           placeholder="Password"
           required>

    <button type="submit" class="submit-btn">
        SIGN IN
    </button>

    <p class="switch-text">
        New to Aurelius Vance?
        <a href="signin.html" id="gotoRegister">
            Create Account
        </a>
    </p>

</form>


<!-- Register Form -->
<form id="registerForm" class="form">

    <input type="text"
           id="regName"
           placeholder="Full Name"
           required>

    <input type="email"
           id="regEmail"
           placeholder="Email Address"
           required>

    <input type="password"
           id="regPassword"
           placeholder="Password"
           required>

    <button type="submit" class="submit-btn">
        CREATE ACCOUNT
    </button>

    <p class="switch-text">
        Already have an account?
        <a href="signin.html" id="gotoSignin">
            Sign In
        </a>
    </p>

</form>

<p id="message"></p>

<a href="index.html" class="back-btn">
← Back To Home
</a>

</div>



<script>

const signinForm = document.getElementById("signinForm");
const registerForm = document.getElementById("registerForm");

const signinTab = document.getElementById("signinTab");
const registerTab = document.getElementById("registerTab");

const gotoRegister = document.getElementById("gotoRegister");
const gotoSignin = document.getElementById("gotoSignin");

function showSignin() {
    signinForm.classList.add("active");
    registerForm.classList.remove("active");

    signinTab.classList.add("active");
    registerTab.classList.remove("active");

    document.getElementById("message").innerHTML = "";
}

function showRegister() {
    registerForm.classList.add("active");
    signinForm.classList.remove("active");

    registerTab.classList.add("active");
    signinTab.classList.remove("active");

    document.getElementById("message").innerHTML = "";
}

signinTab.addEventListener("click", showSignin);
registerTab.addEventListener("click", showRegister);

gotoRegister.addEventListener("click", function (e) {
    e.preventDefault();
    showRegister();
});

gotoSignin.addEventListener("click", function (e) {
    e.preventDefault();
    showSignin();
});





document
.getElementById("registerForm")
.addEventListener(
"submit",
async function(e){

    e.preventDefault();

    const data = {
        fullname:
        document.getElementById("regName").value,

        email:
        document.getElementById("regEmail").value,

        password:
        document.getElementById("regPassword").value
    };

    const response =
    await fetch(
        "http://localhost:5000/register",
        {
            method:"POST",
            headers:{
                "Content-Type":
                "application/json"
            },
            body:
            JSON.stringify(data)
        }
    );

    const result =
await response.json();

const message =
document.getElementById("message");

message.innerHTML =
result.message;

if(response.ok){

    message.className =
    "success";

    document
    .getElementById("registerForm")
    .reset();

    showSignin();
}
else{

    message.className =
    "error";
}

});




document.getElementById("signinForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {
        email: document.getElementById("loginEmail").value,
        password: document.getElementById("loginPassword").value
    };

    const message =
    document.getElementById("message");

    try {

        const response = await fetch(
            "http://localhost:5000/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }
        );

        const result = await response.json();

       if (response.ok) {

    localStorage.setItem(
        "user",
        JSON.stringify(result.user)
    );

    window.location.replace(
        "index.html"
    );
}
        else {
            message.innerHTML = result.message;
            message.className = "error";
        }

    }
    catch (error) {

        message.innerHTML =
        "Cannot connect to server.";

        message.className = "error";
    }

});
</script>


</body>
</html>
